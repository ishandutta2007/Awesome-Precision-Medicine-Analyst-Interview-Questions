<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Animated Light Beam/Glow -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0" />
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </linearGradient>

    <!-- DNA Strand Colors -->
    <linearGradient id="dna-grad-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="dna-grad-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <style>
    .title {
      font-family: 'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-weight: 800;
      font-size: 32px;
      fill: #ffffff;
    }
    .subtitle {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
      letter-spacing: 0.15em;
    }
    .badge {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #38bdf8;
      letter-spacing: 0.1em;
    }
    .pulse-node {
      animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg-grad)" rx="16" />

  <!-- Dynamic/Animating Glow Line in Background -->
  <path d="M -100 100 Q 200 50 400 120 T 900 100" fill="none" stroke="url(#glow-grad)" stroke-width="40">
    <animate attributeName="d" 
             values="M -100 100 Q 200 50 400 120 T 900 100;
                     M -100 100 Q 200 150 400 80 T 900 100;
                     M -100 100 Q 200 50 400 120 T 900 100" 
             dur="10s" 
             repeatCount="indefinite" />
  </path>

  <!-- Grid overlay -->
  <g opacity="0.05">
    <path d="M 0 40 H 800 M 0 80 H 800 M 0 120 H 800 M 0 160 H 800" stroke="#ffffff" stroke-width="1" />
    <path d="M 100 0 V 200 M 200 0 V 200 M 300 0 V 200 M 400 0 V 200 M 500 0 V 200 M 600 0 V 200 M 700 0 V 200" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Left/Center Content -->
  <g transform="translate(60, 50)">
    <!-- Badge -->
    <rect x="0" y="0" width="165" height="24" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <circle cx="12" cy="12" r="4" fill="#22d3ee">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="26" y="15" class="badge">CURATED QUESTIONS</text>

    <!-- Main Title -->
    <text x="0" y="62" class="title">Precision Medicine Analyst</text>
    
    <!-- Subtitle -->
    <text x="0" y="92" class="subtitle">INTERVIEW PREPARATION GUIDE</text>
  </g>

  <!-- DNA Animation / Art on Right Side -->
  <g transform="translate(620, 100)">
    <!-- Animating Helix Group -->
    <g>
      <!-- Horizontal connector lines animating -->
      <line x1="-30" y1="-50" x2="30" y2="50" stroke="#475569" stroke-width="2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
      </line>
      <line x1="-50" y1="-20" x2="50" y2="20" stroke="#475569" stroke-width="2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="30" to="390" dur="12s" repeatCount="indefinite" />
      </line>
      <line x1="-50" y1="20" x2="50" y2="-20" stroke="#475569" stroke-width="2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="12s" repeatCount="indefinite" />
      </line>
      <line x1="-30" y1="50" x2="30" y2="-50" stroke="#475569" stroke-width="2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="90" to="450" dur="12s" repeatCount="indefinite" />
      </line>

      <!-- Sine/Cosine wave animating dots -->
      <!-- Node A -->
      <circle r="8" fill="url(#dna-grad-1)">
        <animateTransform attributeName="transform" type="translate" 
                          values="-30,-50; -50,-20; -50,20; -30,50; 30,50; 50,20; 50,-20; 30,-50; -30,-50" 
                          dur="12s" repeatCount="indefinite" />
      </circle>
      <!-- Node B -->
      <circle r="8" fill="url(#dna-grad-2)">
        <animateTransform attributeName="transform" type="translate" 
                          values="30,50; 50,20; 50,-20; 30,-50; -30,-50; -50,-20; -50,20; -30,50; 30,50" 
                          dur="12s" repeatCount="indefinite" />
      </circle>

      <!-- Additional Outer Orbital Dots -->
      <circle r="4" fill="#a78bfa" opacity="0.8">
        <animateTransform attributeName="transform" type="translate" 
                          values="-60,-10; 0,-60; 60,-10; 0,60; -60,-10" 
                          dur="8s" repeatCount="indefinite" />
      </circle>
      <circle r="4" fill="#22d3ee" opacity="0.8">
        <animateTransform attributeName="transform" type="translate" 
                          values="60,10; 0,60; -60,10; 0,-60; 60,10" 
                          dur="8s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
</svg>
